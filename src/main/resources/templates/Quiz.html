<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Online Exam</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('/9760493.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 20px;
        }

        .container {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            margin-top: 80px;
        }

        header {
            background-color: rgba(0, 100, 0, 0.8);
            width: 100%;
            padding: 15px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .question-container {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            transition: transform 0.2s ease-in-out;
        }
        .question-container:hover {
            transform: scale(1.02);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .options-container div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-container .btn {
            width: 150px;
        }
    </style>
</head>
<body>
    <header> Online Exam Portal </header>

    <div class="container">
        <p class="text-danger">All Questions Are Mandatory.*</p>
        <h3 class="text-center">Quiz Questions</h3>

        <form action="/submitQuiz" method="post">
            <p class="text-black">Choose The Correct Options</p>

            <div th:each="q, index : ${questions}" class="question-container">
                <h5 th:text="'Q' + (${index.index + 1}) + '. ' + ${q.question}"></h5>
                <div class="options-container">
                    <div th:each="opt, optIndex : ${#strings.arraySplit(q.options, ',')}">
                        <input type="radio" th:name="'q' + ${index.index}" th:value="${opt}" required>
                        <label th:text="${opt}"></label>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <input type="submit" value="Submit" class="btn btn-success">
                <a href="./" onclick="return confirm('Are You Sure You Want To Quit This Test')" class="btn btn-danger">Back</a>
            </div>
        </form>

        <!-- ✅ Result Display -->
        <div th:if="${result != null}" class="text-center mt-4">
            <h4>Your Score: <span th:text="${result.score}"></span> / <span th:text="${result.totalQuestions}"></span></h4>
        </div>
    </div>
</body>
</html>
