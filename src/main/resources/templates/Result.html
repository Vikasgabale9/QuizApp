<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Result</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('/9760493.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 20px;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            color: #4CAF50;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #2E8B57;
        }

        .btn-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Quiz Result</h2>
        <p class="score" th:if="${result != null}">
            Your Score: <span th:text="${result.score}"></span> / <span th:text="${result.totalQuestions}"></span>
        </p>
        <p class="text-danger" th:if="${result == null}">Result not available. Please try again.</p>
        
        <div class="btn-container">
            <a href="./" class="btn btn-primary">Back to Home</a>
        </div>
    </div>

</body>
</html>
